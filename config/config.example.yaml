# TG Manager 配置模板
# 敏感信息请放在 .env 中，并通过 ${ENV_VAR} 引用。

telegram:
  api_id: ${TG_API_ID}
  api_hash: ${TG_API_HASH}
  bot_token: ${TG_BOT_TOKEN}
  admin_user_id: ${TG_ADMIN_USER_ID}
  session_dir: "sessions"
  userbot_session: "userbot"
  bot_session: "bot"

database:
  url: ${DATABASE_URL}
  pool_size: 5
  echo: false

rate_limit:
  global_per_minute: 30
  per_chat_interval: 3.0
  join_per_day: 20
  add_member_per_day: 50
  add_member_interval: 30.0
  download_concurrent: 3
  flood_wait_multiplier: 1.5
  flood_wait_pause_threshold: 3
  flood_wait_pause_duration: 300
  jitter_min: 0.5
  jitter_max: 2.0

llm:
  default_provider: "openai"
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      base_url: ${OPENAI_BASE_URL}
      model: "gpt-4o"
      max_tokens: 4096
      temperature: 0.7
    claude:
      api_key: ${ANTHROPIC_API_KEY}
      model: "claude-sonnet-4-20250514"
      max_tokens: 4096
      temperature: 0.7
    gemini:
      api_key: ${GEMINI_API_KEY}
      model: "gemini-2.0-flash"
      max_tokens: 4096
      temperature: 0.7
    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
      max_tokens: 4096
      temperature: 0.7
    ollama:
      base_url: ${OLLAMA_BASE_URL}
      model: "llama3"
      max_tokens: 4096
      temperature: 0.7

plugins:
  enabled:
    - "message.*"
    - "channel.*"
    - "group.*"
    - "auto_reply.*"
    - "scheduler.*"
    - "ai_summary.*"
    - "monitor.*"

plugin_config:
  # 分组键可作用于该命名空间下的所有插件。
  # 更具体的全名键会覆盖分组键，例如 ai_summary.chat_summarizer。
  auto_reply:
    ai_enabled: false
    max_reply_length: 500

  channel:
    rules: []

  scheduler:
    timezone: "Asia/Shanghai"

  ai_summary:
    language: "zh-CN"
    chat_summary_limit: 200

  monitor:
    keywords: []
    alert_target: ${TG_ADMIN_USER_ID}

  group:
    welcome_message: "欢迎 {user} 加入群组"

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file_enabled: false
  file_path: "logs/tg_manager.log"
